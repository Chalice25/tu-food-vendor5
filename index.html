<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU SMART PINTO - Vendor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .step { display: none; }
        .step.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .status-paid { background-color: #ecfdf5; color: #059669; border: 1px solid #10b981; }
        .status-pending { background-color: #fff7ed; color: #ea580c; border: 1px solid #f97316; }
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <header class="bg-white border-b sticky top-0 z-50 p-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-black font-black">TU</div>
                <div>
                    <h1 class="font-black text-gray-800 text-lg uppercase leading-none italic">Smart Pinto</h1>
                    <p id="headerShopName" class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Vendor Portal</p>
                </div>
            </div>
            <div id="vendorStatus" class="text-right hidden">
                <span class="text-[10px] font-bold text-gray-400 uppercase leading-none">Shop Status</span>
                <p class="text-xs font-black text-green-600 italic uppercase">Open</p>
            </div>
        </header>

        <main class="p-6 flex-grow">

            <div id="step1" class="step active">
                <div class="text-center mt-12 mb-10">
                    <div class="text-5xl mb-4">👨‍🍳</div>
                    <h2 class="text-4xl font-black text-gray-800 uppercase tracking-tighter italic">Sign In</h2>
                    <p class="text-gray-400 mt-2 italic">ระบบจัดการคำสั่งอาหารและภาชนะ</p>
                </div>
                <div class="space-y-4 bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100">
                    <div>
                        <label class="text-xs font-bold text-gray-400 ml-2 uppercase">Username</label>
                        <input type="text" id="vUser" placeholder="ระบุชื่อผู้ใช้งาน" class="w-full bg-gray-50 border-2 border-transparent focus:border-red-500 focus:bg-white p-4 rounded-2xl outline-none transition-all mt-1 font-bold">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 ml-2 uppercase">Password</label>
                        <input type="password" id="vPass" placeholder="••••••••" class="w-full bg-gray-50 border-2 border-transparent focus:border-red-500 focus:bg-white p-4 rounded-2xl outline-none transition-all mt-1 font-bold text-center tracking-[0.3em]">
                    </div>
                    <button onclick="vendorLogin()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-red-100 transition-all active:scale-95 uppercase">เข้าสู่ระบบ</button>
                </div>
                <p class="text-center text-[10px] text-gray-400 mt-8 uppercase font-bold">Piyachat Food Center Pilot Project</p>
            </div>

            <div id="step2" class="step">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-black text-gray-800 italic uppercase leading-none">Orders</h2>
                    <button onclick="location.reload()" class="text-[10px] font-bold text-red-500 uppercase border border-red-200 px-3 py-1 rounded-full">Logout</button>
                </div>

                <div id="orderContainer" class="space-y-6">
                    </div>
            </div>

        </main>
    </div>

    <script>
        // เพิ่มรายชื่อร้านค้า (Accounts) ให้หลากหลายขึ้น
        const vendors = [
            { user: "chai_chicken", pass: "1234", name: "ข้าวมันไก่เฮียชัย" },
            { user: "salad_bar", pass: "tu88", name: "สลัดบาร์เพื่อสุขภาพ" },
            { user: "jae_porn", pass: "9999", name: "ตามสั่งเจ๊พร (บร.4)" },
            { user: "eng_noodle", pass: "tu2026", name: "ก๋วยเตี๋ยววิศวะ" }
        ];

        // ข้อมูลออเดอร์จำลอง พร้อมสถานะการชำระเงิน
        const mockOrders = [
            { id: 42, menu: "ข้าวมันไก่ต้ม (อกล้วน)", stuId: "651061xxxx", paid: true, time: "12:15" },
            { id: 43, menu: "สลัดทูน่า ไข่ต้ม", stuId: "661042xxxx", paid: true, time: "12:20" },
            { id: 44, menu: "ข้าวมันไก่ผสม (พิเศษ)", stuId: "651061xxxx", paid: false, time: "12:25" }
        ];

        function vendorLogin() {
            const user = document.getElementById('vUser').value;
            const pass = document.getElementById('vPass').value;

            const vendor = vendors.find(v => v.user === user && v.pass === pass);

            if(vendor) {
                document.getElementById('headerShopName').innerText = vendor.name;
                document.getElementById('vendorStatus').classList.remove('hidden');
                renderOrders();
                goToStep(2);
            } else {
                alert("Username หรือ Password ไม่ถูกต้อง");
            }
        }

        function renderOrders() {
            const container = document.getElementById('orderContainer');
            container.innerHTML = mockOrders.map(order => `
                <div id="card-${order.id}" class="bg-white p-6 rounded-[2.5rem] shadow-md border-l-8 ${order.paid ? 'border-green-500' : 'border-orange-500'} relative overflow-hidden">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest leading-none">Queue</span>
                            <h3 class="text-4xl font-black text-gray-900 leading-none mt-1">A-${order.id}</h3>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] font-black px-3 py-1 rounded-full uppercase italic ${order.paid ? 'status-paid' : 'status-pending'}">
                                ${order.paid ? '✅ PAID (ชำระแล้ว)' : '⚠️ UNPAID (ยังไม่จ่าย)'}
                            </span>
                            <p class="text-[10px] font-bold text-gray-400 mt-2">Pickup: ${order.time} น.</p>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-2xl mb-4">
                        <p class="font-black text-lg text-gray-700 leading-tight">${order.menu}</p>
                        <p class="text-[10px] text-gray-400 mt-1 font-bold uppercase tracking-widest">Student ID: ${order.stuId}</p>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-gray-400 ml-2 uppercase">Scan Pinto ID to Bind</label>
                        <div class="flex gap-2">
                            <input type="text" id="pinto-${order.id}" placeholder="TU-xxx" class="flex-grow bg-gray-50 border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-red-500 font-black uppercase text-center transition-all">
                            <button onclick="bindPinto(${order.id})" class="bg-gray-900 text-white px-6 rounded-2xl font-black uppercase italic text-sm shadow-lg active:scale-95 transition-all">Bind</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function bindPinto(id) {
            const pintoVal = document.getElementById('pinto-' + id).value;
            if(!pintoVal) return alert("กรุณาระบุรหัสปิ่นโตก่อนกดยืนยัน");
            
            const card = document.getElementById('card-' + id);
            card.style.opacity = "0.5";
            card.innerHTML = `
                <div class="py-10 text-center">
                    <div class="text-3xl mb-2">🍱</div>
                    <p class="font-black text-green-600 italic">PINTO ${pintoVal} BOUND SUCCESS!</p>
                    <p class="text-[10px] text-gray-400 uppercase mt-1">อัปเดตสถานะไปยังนักศึกษาเรียบร้อย</p>
                    <button onclick="removeCard(${id})" class="mt-4 text-[10px] font-bold text-gray-400 underline uppercase">Clear Order</button>
                </div>
            `;
        }

        function removeCard(id) {
            document.getElementById('card-' + id).remove();
        }

        function goToStep(num) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + num).classList.add('active');
        }
    </script>
</body>
</html>
